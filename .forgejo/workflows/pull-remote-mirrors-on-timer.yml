# Diverged branches get written to refs/conflicts/<remote>/<branch> on the
# hub instead of refs/heads/, so they don't show up as real branches and
# don't get fanned out by forgesync. To work with them locally:
#
#   # list what's there
#   git ls-remote https://localgitrepo.net/OWNER/REPO.git 'refs/conflicts/*'
#
#   # fetch one down to inspect/merge
#   git fetch https://localgitrepo.net/OWNER/REPO.git \
#     'refs/conflicts/github/BRANCH:refs/conflicts/github/BRANCH'
#
#   # once resolved, delete it from the hub (the script never does this for you)
#   git push https://localgitrepo.net/OWNER/REPO.git \
#     --delete refs/conflicts/github/BRANCH

on:
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-hub
      cancel-in-progress: false
    # this repo gets mirrored to other Forgejo
    # instances. If Actions ever gets enabled there, this stops the job
    # from doing anything unless it's actually running on the hub.
    if: github.server_url == 'https://git.lan.everyls.net'
    steps:
      - name: dependencies
        run: apt update && apt install -y git

      - name: pull external remotes into the hub
        env:
          FORGEJO_URL: https://oauth2:${{ secrets.GITHUB_TOKEN }}@git.lan.everyls.net/${{ github.repository }}.git
          GITHUB_URL: https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          GG_URL: https://oauth2:${{ secrets.GG_PAT }}@git.gay/${{ github.repository }}.git
        run: |
          set -euo pipefail

          # forgesync already pushes hub -> every other remote automatically.
          # This job only handles the reverse: pulling each remote's unique
          # commits back into the hub. --filter=blob:none skips downloading
          # the hub's existing file contents (we don't need them, just the
          # commit graph) — meaningfully cheaper to clone on large repos.
          git clone --mirror --filter=blob:none "$FORGEJO_URL" repo.git
          cd repo.git
          git config remote.origin.mirror false

          # Remotes to pull FROM. Add a new repo: add its secret + *_URL
          # above, add one line here. forgesync handles pushing to it.
          REMOTES=(
            "github:$GITHUB_URL"
            "gg:$GG_URL"
          )

          conflicts=()
          fetch_failures=()

          reconcile_branches() {
            local name="$1"
            while read -r ref; do
              [ -z "$ref" ] && continue
              branch="${ref#refs/$name/heads/}"
              local_ref="refs/heads/$branch"

              if ! git show-ref --quiet "$local_ref"; then
                echo "  [new]      $branch (only on $name)"
                git update-ref "$local_ref" "$ref"
                continue
              fi

              a_sha=$(git rev-parse "$local_ref")
              b_sha=$(git rev-parse "$ref")

              if [ "$a_sha" = "$b_sha" ]; then
                continue
              elif git merge-base --is-ancestor "$a_sha" "$b_sha"; then
                echo "  [ff]       $branch  ${a_sha:0:7} -> ${b_sha:0:7}  (from $name)"
                git update-ref "$local_ref" "$b_sha"
              elif git merge-base --is-ancestor "$b_sha" "$a_sha"; then
                echo "  [skip]     $branch (hub already ahead of $name)"
              else
                echo "  [DIVERGED] $branch vs $name — leaving hub's version untouched"
                git update-ref "refs/conflicts/${name}/${branch}" "$b_sha"
                conflicts+=("$branch (vs $name)")
              fi
            done < <(git for-each-ref --format='%(refname)' "refs/$name/heads/")
          }

          reconcile_tags() {
            local name="$1"
            while read -r ref; do
              [ -z "$ref" ] && continue
              tag="${ref#refs/$name/tags/}"
              local_ref="refs/tags/$tag"
              if ! git show-ref --quiet "$local_ref"; then
                echo "  [new]   tag $tag (from $name)"
                git update-ref "$local_ref" "$ref"
              else
                a_sha=$(git rev-parse "$local_ref")
                b_sha=$(git rev-parse "$ref")
                if [ "$a_sha" != "$b_sha" ]; then
                  echo "  [WARN]  tag $tag differs between hub and $name — leaving hub's as-is (tags shouldn't move)"
                fi
              fi
            done < <(git for-each-ref --format='%(refname)' "refs/$name/tags/")
          }

          for entry in "${REMOTES[@]}"; do
            name="${entry%%:*}"
            url="${entry#*:}"

            echo "==> fetching $name"
            if ! git fetch "$url" "+refs/heads/*:refs/$name/heads/*" "+refs/tags/*:refs/$name/tags/*"; then
              echo "  [WARN] could not fetch from $name — repo may not exist there yet, or check credentials. Skipping $name this run."
              fetch_failures+=("$name")
              continue
            fi

            echo "==> reconciling branches from $name"
            reconcile_branches "$name"

            echo "==> reconciling tags from $name"
            reconcile_tags "$name"

            git for-each-ref --format="delete %(refname)" "refs/$name/" | git update-ref --stdin
          done

          echo "==> pushing merged state to the hub"
          git push origin 'refs/heads/*:refs/heads/*'
          git push origin 'refs/tags/*:refs/tags/*'
          if [ -n "$(git for-each-ref refs/conflicts/)" ]; then
            git push origin 'refs/conflicts/*:refs/conflicts/*'
          fi

          if [ "${#fetch_failures[@]}" -gt 0 ]; then
            echo "::warning::Could not fetch from: ${fetch_failures[*]} (repo missing there, or bad/missing credentials)"
          fi

          if [ "${#conflicts[@]}" -gt 0 ]; then
            echo "::warning::Diverged branches need manual merge: ${conflicts[*]}"
          fi
